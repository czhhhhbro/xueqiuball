<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>雪球 HOME · IM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航 */
        .header {
            background: linear-gradient(135deg, #7B61FF 0%, #9D85FE 100%);
            color: white;
            padding: 16px 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(123, 97, 255, 0.15);
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 消息气泡 - 仿 Telegram 卡片圆角 */
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        /* 自己发的：紫色渐变 */
        .message.self {
            align-self: flex-end;
            background: linear-gradient(135deg, #7B61FF, #9277FF);
            color: white;
            border-bottom-right-radius: 6px;
        }

        /* 对方：浅灰 */
        .message.other {
            align-self: flex-start;
            background: #f1f1f5;
            color: #111;
            border-bottom-left-radius: 6px;
        }

        /* 输入框区域 */
        .input-bar {
            display: flex;
            padding: 12px 16px;
            gap: 10px;
            background: white;
            border-top: 1px solid #eee;
        }

        #msgInput {
            flex: 1;
            padding: 14px 18px;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            outline: none;
            font-size: 15px;
        }

        #msgInput:focus {
            border-color: #7B61FF;
        }

        button {
            padding: 14px 22px;
            border-radius: 24px;
            border: none;
            background: linear-gradient(135deg, #7B61FF, #9D85FE);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        button:active {
            opacity: 0.85;
        }
    </style>
</head>

<body>
<div class="header">雪球 HOME · 即时通讯</div>
<div class="chat-container" id="chatBox"></div>
<div class="input-bar">
    <input type="text" id="msgInput" placeholder="输入消息...">
    <button onclick="sendMessage()">发送</button>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const msgInput = document.getElementById('msgInput');

    // 发送消息
    async function sendMessage() {
        const content = msgInput.value.trim();
        if (!content) return;

        await fetch('/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content })
        });

        msgInput.value = '';
        loadMessages();
    }

    // 加载消息
    async function loadMessages() {
        const res = await fetch('/messages');
        const msgs = await res.json();
        chatBox.innerHTML = '';

        msgs.forEach(m => {
            const div = document.createElement('div');
            div.className = `message ${m.self ? 'self' : 'other'}`;
            div.innerText = m.content;
            chatBox.appendChild(div);
        });

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 每1秒刷新
    setInterval(loadMessages, 1000);
    loadMessages();
</script>
</body>
</html>
